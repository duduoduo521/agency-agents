```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎨 色彩迷宫 - 色彩挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background: rgba(0, 0, 0, 0.2);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            touch-action: none;
        }

        /* UI Overlay */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            transition: opacity 0.3s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 3s ease infinite;
            text-align: center;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .game-intro {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #dfe6e9;
            max-width: 600px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(45deg, #6c5ce7, #a29bfe);
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 20px rgba(108, 92, 231, 0.6);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #0984e3, #74b9ff);
            box-shadow: 0 4px 15px rgba(9, 132, 227, 0.4);
        }

        .btn-secondary:hover {
            box-shadow: 0 7px 20px rgba(9, 132, 227, 0.6);
        }

        /* HUD */
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 50;
        }

        .score-board {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            font-size: 1.3rem;
        }

        .score-value {
            color: #feca57;
            font-weight: bold;
            margin-left: 5px;
        }

        .lives-container {
            display: flex;
            gap: 5px;
        }

        .life {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff6b6b;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.6);
        }

        .life.lost {
            opacity: 0.3;
        }

        .pause-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 50;
            pointer-events: auto;
        }

        .pause-icon {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 3px;
        }

        .pause-icon.paused {
            width: 20px;
            height: 20px;
            position: relative;
        }

        .pause-icon.paused::before,
        .pause-icon.paused::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 20px;
            background: white;
            border-radius: 2px;
        }

        .pause-icon.paused::before {
            left: 0;
        }

        .pause-icon.paused::after {
            right: 0;
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .game-intro { font-size: 1rem; padding: 0 20px; }
            .btn { padding: 12px 30px; font-size: 1.2rem; }
            .pause-btn { width: 35px; height: 35px; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- HUD -->
        <div class="hud" id="hud">
            <div class="score-board">
                分数: <span id="scoreDisplay" class="score-value">0</span>
            </div>
            <div class="lives-container" id="livesContainer">
                <div class="life"></div>
                <div class="life"></div>
                <div class="life"></div>
            </div>
            <div class="pause-btn" id="pauseBtn">
                <div class="pause-icon"></div>
            </div>
        </div>

        <!-- Start Screen -->
        <div class="ui-overlay" id="startScreen">
            <h1>🎨 色彩迷宫</h1>
            <div class="game-intro">
                <p>在动态迷宫中引导彩色粒子，通过匹配颜色收集能量！</p>
                <p style="margin-top: 15px;">📱 <strong>移动端：</strong>滑动屏幕控制粒子</p>
                <p>💻 <strong>PC端：</strong>鼠标拖拽控制粒子</p>
            </div>
            <button class="btn" id="startBtn">开始游戏</button>
            <div style="margin-top: 20px; color: #b2bec3; font-size: 0.9rem;">
                最高分: <span id="highScoreDisplay">0</span>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div class="ui-overlay hidden" id="gameOverScreen">
            <h1>游戏结束</h1>
            <div class="game-intro">
                <p>最终得分: <span id="finalScore" style="color: #feca57; font-weight: bold;">0</span></p>
                <p style="margin-top: 10px;">最高分: <span id="newHighScore" style="color: #74b9ff; font-weight: bold;">0</span></p>
            </div>
            <button class="btn" id="restartBtn">再玩一次</button>
            <button class="btn btn-secondary" id="homeBtn">返回主页</button>
        </div>

        <!-- Pause Screen -->
        <div class="ui-overlay hidden" id="pauseScreen">
            <h1>游戏暂停</h1>
            <div class="game-intro">
                <p>休息一下，准备继续挑战！</p>
            </div>
            <button class="btn" id="resumeBtn">继续游戏</button>
            <button class="btn btn-secondary" id="quitBtn">退出游戏</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
